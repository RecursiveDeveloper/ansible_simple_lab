---
- hosts: all
  name: Install Apache Web Server
  gather_facts: true
  become: true

  tasks:
    - name: install dependencies
      package:
        name:
          - curl
          - net-tools
          - htop
        state: present
        
    - name: Install Apache (Debian/Ubuntu)
      apt:
        name: apache2
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Apache (RedHat/CentOS)
      yum:
        name: httpd
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure Apache is running and enabled (Debian/Ubuntu)
      service:
        name: apache2
        state: started
        enabled: yes
      when: ansible_os_family == "Debian"

    - name: Ensure Apache is running and enabled (RedHat/CentOS)
      service:
        name: httpd
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"

    - name: Create a simple HTML file
      copy:
        dest: /var/www/html/index.html
        content: "<html><body><h1>Welcome to Ansible Web Server!</h1></body></html>"
        owner: www-data
        group: www-data
        mode: '0644'